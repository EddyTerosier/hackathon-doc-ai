version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: hackathon-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: hackathon_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: hackathon-backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_TIME_ZONE: Europe/Paris
      MONGO_DB_NAME: hackathon_db
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin123
      MONGO_AUTH_SOURCE: admin
      JWT_SECRET_KEY: super-secret-jwt-key
      JWT_ACCESS_LIFETIME_MINUTES: 60
      JWT_REFRESH_LIFETIME_DAYS: 7
      MEDIA_ROOT: /data
      AIRFLOW_URL: http://airflow:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASSWORD: admin
    ports:
      - "8000:8000"
    volumes:
      - media_data:/data
    depends_on:
      - mongo
      - airflow

  mongo-express:
    image: mongo-express:1.0.2
    container_name: hackathon-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongo

  airflow:
    build:
      context: ./airflow
    container_name: hackathon-airflow
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      MONGO_URI: mongodb://admin:admin123@mongo:27017/?authSource=admin
      PROJECT_ROOT: /opt/airflow
      DATA_ROOT: /data
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - media_data:/data
      - airflow_logs:/opt/airflow/logs
      - airflow_db:/opt/airflow
    depends_on:
      - mongo
    command: standalone

volumes:
  mongo_data:
  media_data:
  airflow_logs:
  airflow_db:
